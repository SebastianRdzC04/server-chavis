; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:mkrwifi1010]
platform      = atmelsam
board         = mkrwifi1010
framework     = arduino
monitor_speed = 115200

lib_deps =
  arduino-libraries/WiFiNINA@^1.9.0
  khoih-prog/FlashStorage_SAMD@^1.3.2

; Nota: el SAMD21 (MKR WiFi 1010) no tiene EEPROM física.
; FlashStorage_SAMD emula EEPROM usando la Flash NVM del SAMD21.
; WiFiNINA se declara explícitamente porque PlatformIO no la resuelve
; automáticamente desde el framework para todos los entornos SAMD.
