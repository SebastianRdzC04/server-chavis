services:
  test-sender:
    image: node:20-alpine
    container_name: chavis-test-sender
    working_dir: /app
    command: sh -c "npm install socket.io-client && node test-sender.js"
    volumes:
      - ./test-sender.js:/app/test-sender.js
    environment:
      - SOCKET_URL=https://ws-chavis.devas-projects.sbs
      - INTERVAL_MS=500
    restart: unless-stopped
    networks:
      - default
