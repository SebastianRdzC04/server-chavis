services:
  mongo:
    image: mongo:7
    container_name: chavis-mongo
    restart: unless-stopped
    ports:
      - "3102:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-chavis}
    networks:
      - chavis-net

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: chavis-server
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=${PORT:-1100}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/chavis}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-chavis-access-secret-dev}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-chavis-refresh-secret-dev}
    depends_on:
      - mongo
    networks:
      - chavis-net

  front:
    build:
      context: ../front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:1100}
    container_name: chavis-front
    restart: unless-stopped
    ports:
      - "3101:80"
    depends_on:
      - server
    networks:
      - chavis-net

volumes:
  mongo_data:
    driver: local

networks:
  chavis-net:
    driver: bridge
